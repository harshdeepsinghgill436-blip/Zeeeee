name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-edge-function:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy send-emails edge function
        run: supabase functions deploy send-emails --project-ref gnmqquorrhtnpmuzoitc --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
